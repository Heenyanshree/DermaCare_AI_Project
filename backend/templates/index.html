<!DOCTYPE html>
<html>
<head>
    <title>DermaCare AI - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: Arial, sans-serif; padding: 20px; }
        h1 { text-align: center; margin-bottom: 30px; color: #343a40; }
        .result-card { margin-top: 20px; padding: 20px; background: #dff9fb; border-left:5px solid #1e90ff; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .img-preview { max-width: 100%; max-height: 300px; margin-top: 10px; border-radius: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1>DermaCare AI</h1>
    <div class="text-center mb-4">
        <a href="/dashboard" class="btn btn-primary">View Admin Dashboard</a>
        <a href="/history" class="btn btn-info">View Prediction History</a>
    </div>
    <form method="POST" action="/predict" enctype="multipart/form-data" class="text-center">
        <input type="file" name="file" class="form-control mb-3" required>
        <button type="submit" class="btn btn-success">Predict</button>
    </form>

    {% if prediction %}
    <div class="result-card text-center mt-4">
        <h3>Prediction: <strong>{{ prediction }}</strong></h3>
        <h4>Confidence: {{ confidence }}%</h4>
        <p>Suggestion: {{ suggestion }}</p>
        {% if img_path %}
        <img src="{{ img_path }}" class="img-preview">
        {% endif %}
    </div>
    {% endif %}
</div>
</body>
</html>
