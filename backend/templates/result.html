<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>
    <style>
        body { text-align:center; font-family: Arial, sans-serif; background:#f5f5f5; }
        h1 { color:#333; margin-top:50px; }
        img { max-width:300px; margin-top:20px; }
        table { margin: 20px auto; border-collapse: collapse; }
        th, td { border:1px solid #ccc; padding:10px 20px; }
        th { background:#eee; }
    </style>
</head>
<body>
    <h1>Prediction Result</h1>
    <img src="/uploads/{{filename}}" alt="Uploaded Image">
    <h2>Predicted Class: {{prediction}}</h2>
    <h3>Probabilities:</h3>
    <table>
        <tr>
            <th>Class</th>
            <th>Probability</th>
        </tr>
        {% for cls, prob in probabilities.items() %}
        <tr>
            <td>{{cls}}</td>
            <td>{{prob}}</td>
        </tr>
        {% endfor %}
    </table>
    <a href="/">⬅ Upload Another Image</a>
</body>
</html>
